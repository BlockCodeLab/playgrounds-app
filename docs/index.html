<!doctype html>
<html>
  <head>
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge,chrome=1"
    />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1"
    />
    <meta charset="UTF-8" />
    <title>BlockCode Playgrounds</title>
    <link
      rel="stylesheet"
      href="//unpkg.com/docsify/themes/vue.css"
    />
    <link
      rel="stylesheet"
      href="//unpkg.com/@docisfy/vite-coverpage/vite-coverpage.css"
    />
  </head>
  <body>
    <style>
      :root {
        --theme-color: #4c97ff;
      }
      .cover .mask {
        background: #e9f1fc;
      }
      .cover .cover-main img:first-child {
        transform: perspective(100px) translate(-60%, -50%) rotateY(-2deg) !important;
        width: 500px !important;
        max-height: unset !important;
      }
      .app-name img {
        width: 80%;
      }
      .markdown-section {
        max-width: 960px;
      }
      .docsify-pagination-container {
        padding: 10px 20px;
        height: auto;
      }
      .pagination-item-title {
        font-size: 1em;
      }
    </style>
    <div id="app"></div>
    <script>
      window.$docsify = {
        repo: 'BlockCodeLab/playgrounds-app',
        logo: '/_media/bar.png',
        name: 'BlockCode Playgrounds',
        nameLink: {
          '/en/': '#/en/README',
          '/zh-hans/': '#/zh-hans/README',
          '/zh-hant/': '#/zh-hant/README',
        },
        coverpage: ['/en/', '/zh-hans/', '/zh-hant/'],
        loadNavbar: true,
        loadSidebar: true,
        subMaxLevel: 4,
        autoHeader: true,
        auto2top: true,

        search: {
          maxAge: 86400000,
          paths: 'auto',
          placeholder: {
            '/en/': 'Type to search',
            '/zh-hans/': '搜索',
            '/zh-hant/': '搜索',
          },
          noData: {
            '/en/': 'No Results',
            '/zh-hans/': '找不到结果',
            '/zh-hant/': '找不到結果',
          },
          depth: 2,
          hideOtherSidebarContent: false,
        },
        copyCode: {
          buttonText: {
            '/en/': 'Copy to clipboard',
            '/zh-hans/': '点击复制',
            '/zh-hant/': '點擊複製',
          },
          errorText: {
            '/en/': 'Error',
            '/zh-hans/': '错误',
            '/zh-hant/': '錯誤',
          },
          successText: {
            '/en/': 'Copied',
            '/zh-hans/': '复制',
            '/zh-hant/': '複製',
          },
        },
        pagination: {
          previousText: {
            '/en/': 'PREVIOUS',
            '/zh-hans/': '上一篇',
            '/zh-hant/': '上一篇',
          },
          nextText: {
            '/en/': 'NEXT',
            '/zh-hans/': '下一篇',
            '/zh-hant/': '下一篇',
          },
          crossChapter: true,
          crossChapterText: true,
        },
        select: {
          sync: true,
          theme: 'classic',
          selected: {
            硬件选择: 'Arduino',
          },
        },

        plugins: [
          (hook, vm) => {
            // 自动切换语言
            hook.mounted(() => {
              if (vm.route.path === '/') {
                const langs = navigator.languages || [navigator.language];
                for (let raw of langs) {
                  const lang = raw.toLowerCase();
                  if (!lang.startsWith('zh')) continue;
                  if (lang.includes('hant') || lang.includes('tw') || lang.includes('hk') || lang.includes('mo')) {
                    location.href = '#/zh-hant/';
                    return;
                  }
                  location.href = '#/zh-hans/';
                  return;
                }
                // 没有中文
                location.href = '#/en/';
              }
            });
            // 应用 pangu.js
            hook.doneEach(() => pangu && pangu.spacingNode(document.getElementById('main')));
          },
        ],
      };
    </script>
    <script src="//unpkg.com/pangu/dist/browser/pangu.umd.js"></script>
    <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
    <script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script>
    <script src="//unpkg.com/docsify/lib/plugins/zoom-image.min.js"></script>
    <script src="//unpkg.com/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="//unpkg.com/docsify-select/dist/docsify-select.min.js"></script>
  </body>
</html>
